<ion-header [translucent]="true">
</ion-header>

<ion-content [fullscreen]="true">
  <div class="fp-background">

    <ion-back-button class="btn-back" text="" defaultHref="/login"></ion-back-button>

    <div class="fp-card">
      <h1 class="fp-title">Esqueci minha senha</h1>

      <p *ngIf="!onStep2" class="fp-subtitle">
        Para redefinir sua senha, informe o usuário ou CPF cadastrado na sua conta
      </p>

      <p *ngIf="onStep2" class="fp-subtitle">
        Conta encontrada com sucesso! Insira uma nova senha para a conta <strong>{{inputValue}}</strong>.
      </p>

      <ion-input
        *ngIf="!onStep2"
        class="fp-input"
        [class.input-error]="submittedStep1 && !inputValue.trim()"
        type="text"
        fill="outline"
        label="Usuário ou CPF"
        labelPlacement="floating"
        aria-label="Usuário ou CPF"
        [(ngModel)]="inputValue">
      </ion-input>

      <ion-input
        *ngIf="onStep2"
        class="fp-input"
        [class.input-error]="submittedStep2 && !inputValueNewPassword.trim()"
        type="password"
        fill="outline"
        label="Nova senha"
        labelPlacement="floating"
        aria-label="Nova senha"
        [(ngModel)]="inputValueNewPassword">
      </ion-input>

      <ion-button *ngIf="!onStep2" class="btn-proximo" expand="block" aria-label="Próximo" (click)="onProximo()">
        Próximo
      </ion-button>

      <ion-button *ngIf="onStep2" class="btn-proximo" expand="block" aria-label="Redefinir" (click)="onRedefinir()">
        Redefinir
      </ion-button>

      <ion-button class="btn-cancelar" fill="clear" aria-label="Cancelar" (click)="onCancelar()">
        Cancelar
      </ion-button>
    </div>

  </div>
</ion-content>
