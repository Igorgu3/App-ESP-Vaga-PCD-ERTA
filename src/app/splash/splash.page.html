<ion-header [translucent]="true">
</ion-header>

<ion-content [fullscreen]="true">
  <div class="splash-background" id="content">

    <!-- Logo + "Free Access": sobem juntos como bloco -->
    <div class="logo-section" [class.logo-top]="!isSplashVisible">
      <div class="logo-wrapper">
        <img src="assets/images/simbolo_TA.svg" alt="Logo Vaga TA" class="splash-logo">
      </div>
      <h1 class="splash-title">Acesso Livre</h1>
    </div>

    <!-- Subtítulo: desaparece na transição -->
    <div class="text-section" [class.text-out]="!isSplashVisible">
      <p class="splash-subtitle">Garantindo seu direito!</p>
    </div>

    <!-- Botões: aparecem após a transição -->
    <div class="buttons-section" [class.buttons-in]="!isSplashVisible">
      <ion-button class="btn-entrar" id="btn-entrar" aria-label="Entrar" (click)="toLogin()">
        Entrar
      </ion-button>
      <ion-button class="btn-cadastrar" id="btn-cadastrar" aria-label="Sou PCD e Quero me Cadastrar"  (click)="toRegister()">
        Sou PCD e Quero me Cadastrar
      </ion-button>
    </div>

  </div>
</ion-content>
