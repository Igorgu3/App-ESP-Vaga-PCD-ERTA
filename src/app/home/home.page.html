<ion-header [translucent]="true">
</ion-header>

<ion-content [fullscreen]="true">
  <div class="home-background">

    <div class="home-topbar">
      <ion-button id="btn-mais" class="btn-menu" fill="clear">
        <ion-icon name="menu-outline"></ion-icon>
      </ion-button>
    </div>

    <div class="logo-section">
      <div class="logo-wrapper">
        <img src="assets/images/simbolo_TA.svg" alt="Logo Vaga TA" class="logo-img">
      </div>
      <h1 class="home-title">Free Access</h1>
    </div>

    <div class="fp-card">
      <h2 class="fp-title">Vagas Próximas de Você:</h2>
      <div class="mapa">
        <img src="assets/images/mapa_mockup.png" alt="Mapa Vaga TA" class="mapa-img">
      </div>
    </div>

    <ion-button class="btn-liberar" expand="block" (click)="onLiberarVaga()">
      <ion-icon name="radio-outline" slot="start"></ion-icon>
      EMITIR SINAL — LIBERAR VAGA
      <ion-icon name="lock-open-outline" slot="end"></ion-icon>
    </ion-button>

    <ion-popover trigger="btn-mais" triggerAction="click" [dismissOnSelect]="true"
                 side="bottom" alignment="start" class="menu-popover">
      <ng-template>
        <ion-list lines="none">
          @for (item of items; track item.name) {
            <ion-item button (click)="onItemClicked(item)">
              <ion-icon [name]="item.icon" slot="start"></ion-icon>
              {{ item.name }}
            </ion-item>
          }
        </ion-list>
      </ng-template>
    </ion-popover>

    <ion-modal [isOpen]="isModalOpen" (ionModalDidDismiss)="setOpen(false)">
      <ng-template>
        <ion-header>
          <ion-toolbar class="modal-toolbar">
            <ion-title>Confirma a liberação da vaga?</ion-title>
          </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding modal-body">
          <p class="modal-desc">Ao confirmar, o sinal será emitido para liberar a vaga selecionada.</p>
          <ion-button expand="block" class="btn-sim" (click)="setOpen(false)">
            <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
            Sim, liberar!
          </ion-button>
          <ion-button expand="block" fill="outline" class="btn-cancelar" (click)="setOpen(false)">
            Cancelar
          </ion-button>
        </ion-content>
      </ng-template>
    </ion-modal>

  </div>
</ion-content>
