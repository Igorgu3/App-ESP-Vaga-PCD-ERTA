<ion-header [translucent]="true">
</ion-header>

<ion-content [fullscreen]="true">
  <div class="login-background">

    <ion-back-button class="btn-back" text="" defaultHref="/splash" (click)="onBackButton()"></ion-back-button>

    <div class="logo-section">
      <div class="logo-wrapper">
        <img src="assets/images/simbolo_TA.svg" alt="Logo Vaga TA" class="logo-img">
      </div>
      <h1 class="login-title">Acesso Livre</h1>
    </div>

    <div class="form-section">
      
      <ion-input
        class="login-input"
        type="text"
        fill="outline"
        label="Nome Completo"
        labelPlacement="floating"
        aria-label="Nome Completo">
      </ion-input>

      <ion-input
        class="login-input"
        type="number"
        fill="outline"
        label="CPF"
        labelPlacement="floating"
        aria-label="CPF" [(ngModel)]="cpf" (ionChange)="onCpfChange($event)">
      </ion-input>

      @if (cpf === '10093769695') {
        <div class="cpf-feedback cpf-feedback--invalid">
          <ion-icon name="close-circle-outline"></ion-icon>
          <span>CPF inválido — não consta como PCD cadastrado</span>
        </div>
      } @else if (cpf.length > 1) {
        <div class="cpf-feedback cpf-feedback--valid">
          <ion-icon name="checkmark-circle-outline"></ion-icon>
          <span>CPF válido</span>
        </div>
      }

      <ion-input
        class="login-input"
        type="number"
        fill="outline"
        label="Número da Credencial"
        labelPlacement="floating"
        aria-label="Número da Credencial">
      </ion-input>

      <ion-input
        class="login-input"
        type="text"
        fill="outline"
        label="Placa do Veículo"
        labelPlacement="floating"
        aria-label="Placa do Veículo">
      </ion-input>

      <ion-input
        class="login-input"
        type="email"
        fill="outline"
        label="E-mail"
        labelPlacement="floating"
        aria-label="E-mail">
      </ion-input>

      <ion-input
        class="login-input"
        type="text"
        fill="outline"
        label="Usuário"
        labelPlacement="floating"
        aria-label="Usuário">
      </ion-input>

      <ion-input
        class="login-input"
        type="password"
        fill="outline"
        label="Senha"
        labelPlacement="floating"
        aria-label="Senha">
      </ion-input>

      <ion-button class="btn-logar" expand="block" aria-label="Criar minha conta" (click)="register()">
        Criar minha conta
      </ion-button>

      <ion-button class="btn-forgot" fill="clear" aria-label="Já tem uma conta? Faça login aqui!"(click)="toLogin()" slot="end">
        Já tem uma conta? Faça login aqui!
      </ion-button>
    </div>

  </div>
</ion-content>
